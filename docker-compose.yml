services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: offbook
      POSTGRES_PASSWORD: offbook
      POSTGRES_DB: offbook
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offbook"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://offbook:offbook@postgres:5432/offbook?sslmode=disable
      PORT: "8000"
      FRONTEND_URL: http://localhost:5173
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
